name: ciprof demo

on:
  workflow_dispatch:
    inputs:
      workload:
        description: 'Workload to profile'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - npm
          - pip

jobs:
  profile:
    runs-on: ubuntu-latest

    steps:
      - name: Install yeet
        run: curl -fsSL https://yeet.cx/install.sh | sh -s -- --no-phone-home
        env:
          YEET_INSTALL: /usr/local

      - name: Install BPF build deps
        run: |
          sudo apt-get install -y libbpf-dev clang linux-tools-common
          # linux-tools-common installs a wrapper bpftool that looks for
          # /usr/lib/linux-tools/$(uname -r)/bpftool, which won't exist on
          # Azure runners since the kernel version doesn't match any apt package.
          # Find whatever versioned binary did get installed and link it directly.
          BPFTOOL=$(find /usr/lib/linux-tools -name bpftool -executable 2>/dev/null | head -1)
          if [ -z "$BPFTOOL" ]; then
            PKG=$(apt-cache search '^linux-tools-[0-9]' | grep -v lowlatency | grep -v xilinx | grep -v cloud | awk '{print $1}' | head -1)
            sudo apt-get install -y "$PKG"
            BPFTOOL=$(find /usr/lib/linux-tools -name bpftool -executable 2>/dev/null | head -1)
          fi
          sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
          bpftool version

      - name: Start ciprof
        run: |
          set -x
          SENTINEL=$(mktemp)
          SENTINEL_INO=$(stat -c '%i' "$SENTINEL")
          echo "SENTINEL=$SENTINEL" >> $GITHUB_ENV
          yeet run -T https://github.com/yeet-src/ciprof -- --start --sentinel-inode "$SENTINEL_INO" > ciprof.log 2>&1 &
          echo "CIPROF_PID=$!" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      # ── Node.js workload ─────────────────────────────────────────────────────

      - if: inputs.workload == 'npm' || inputs.workload == 'full'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - if: inputs.workload == 'npm' || inputs.workload == 'full'
        name: npm install
        run: |
          mkdir -p demo-node && cd demo-node
          npm init -y
          npm install \
            react react-dom next \
            typescript @types/react @types/node \
            eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin \
            jest ts-jest @types/jest \
            webpack webpack-cli ts-loader

      - if: inputs.workload == 'npm' || inputs.workload == 'full'
        name: npm typecheck
        run: |
          cd demo-node
          npx tsc --init --strict --jsx react
          cat > index.tsx << 'EOF'
          import React from 'react';
          interface Props { name: string; count: number; }
          export function Counter({ name, count }: Props) {
            return <div>{name}: {count}</div>;
          }
          EOF
          npx tsc --noEmit 2>/dev/null || true

      - if: inputs.workload == 'npm' || inputs.workload == 'full'
        name: npm test
        run: |
          cd demo-node
          cat > sum.test.ts << 'EOF'
          const sum = (a: number, b: number) => a + b;
          test('adds 1 + 2 to equal 3', () => { expect(sum(1, 2)).toBe(3); });
          test('adds 5 + 5 to equal 10', () => { expect(sum(5, 5)).toBe(10); });
          EOF
          npx jest --passWithNoTests 2>/dev/null || true

      # ── Python workload ──────────────────────────────────────────────────────

      - if: inputs.workload == 'pip' || inputs.workload == 'full'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - if: inputs.workload == 'pip' || inputs.workload == 'full'
        name: pip install
        run: pip install numpy pandas scipy scikit-learn matplotlib seaborn

      - if: inputs.workload == 'pip' || inputs.workload == 'full'
        name: pip train
        run: |
          python - << 'EOF'
          import numpy as np
          import pandas as pd
          from sklearn.datasets import fetch_california_housing
          from sklearn.ensemble import GradientBoostingRegressor
          from sklearn.model_selection import cross_val_score
          from sklearn.preprocessing import StandardScaler
          from sklearn.pipeline import Pipeline

          data = fetch_california_housing()
          df = pd.DataFrame(data.data, columns=data.feature_names)
          print(df.describe().to_string())

          pipe = Pipeline([
              ('scaler', StandardScaler()),
              ('model', GradientBoostingRegressor(n_estimators=200, max_depth=4)),
          ])
          scores = cross_val_score(pipe, data.data, data.target, cv=5, scoring='r2')
          print(f'\nR² {scores.mean():.3f} ± {scores.std():.3f}')
          EOF

      - if: inputs.workload == 'pip' || inputs.workload == 'full'
        name: pip test
        run: |
          pip install pytest
          python -m pytest --co -q 2>/dev/null || echo "no tests collected"

      # ── Report ───────────────────────────────────────────────────────────────

      - name: ciprof report
        if: always()
        run: |
          set -x
          rm -f "$SENTINEL"
          while kill -0 "$CIPROF_PID" 2>/dev/null; do sleep 1; done
          cat ciprof.log
